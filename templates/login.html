<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company GPT — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e5e8ee;
    --surface: #000000;
    --border: rgb(252, 243, 243);
    --accent: #4f6ef7;
    --accent2: #a78bfa;
    --text: #e8eaf0;
    --muted: #6b7280;
    --error: #f87171;
    --success: #34d399;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: drift 12s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: #4f6ef7; top: -150px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #a78bfa; bottom: -100px; right: -50px; animation-delay: -4s; }
  .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  /* Grid lines */
  .grid-lines {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 10;
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    box-shadow:
      0 0 0 1px rgba(79,110,247,0.1),
      0 40px 80px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(24px);
  }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 8px 24px rgba(79,110,247,0.4);
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .logo-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    background: rgba(79,110,247,0.06);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
  }
  input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-login {
    width: 100%;
    margin-top: 12px;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 8px 24px rgba(79,110,247,0.35);
  }
  .btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(79,110,247,0.45); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 8px;
    color: var(--error);
    font-size: 13px;
    display: none;
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .footer-note {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  .footer-note span { color: var(--accent2); }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-lines"></div>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">CTD</div>
    <div class="logo-text">
      <h1>Company GPT</h1>
      <p>Internal Knowledge Assistant</p>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <span id="btnLabel">Sign In →</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <p class="footer-note">Secure access · <span>Role-based permissions</span> · JWT auth</p>
</div>

<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const label = document.getElementById('btnLabel');
    const spinner = document.getElementById('spinner');
    const errorMsg = document.getElementById('errorMsg');

    if (!username || !password) {
      showError('Please enter both username and password.');
      return;
    }

    btn.disabled = true;
    label.style.display = 'none';
    spinner.style.display = 'block';
    errorMsg.style.display = 'none';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
        credentials: 'include',
      });
      const data = await res.json();
      if (res.ok && data.success) {
        window.location.href = '/';
      } else {
        showError(data.detail || 'Login failed. Please try again.');
      }
    } catch (e) {
      showError('Network error. Please check your connection.');
    } finally {
      btn.disabled = false;
      label.style.display = 'block';
      spinner.style.display = 'none';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'shake 0.3s ease';
  }
</script>
</body>
</html>
